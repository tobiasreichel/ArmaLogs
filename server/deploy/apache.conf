<VirtualHost *:80>
    ServerName armalogs.local
    DocumentRoot /var/www/armalogs/public

    <Directory /var/www/armalogs/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/armalogs/includes>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/armalogs_error.log
    CustomLog ${APACHE_LOG_DIR}/armalogs_access.log combined
</VirtualHost>
