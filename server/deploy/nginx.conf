server {
    listen 80;
    server_name armalogs.local;
    root /var/www/armalogs/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location /includes/ {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
    }
}
